<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>El Despacho de Overton</title>
<meta name="robots" content="noindex"/>
<script>
// GitHub Pages SPA routing trick
// Convierte /sentencias/ en /?_v=sentencias y luego index.html restaura la URL
(function(){
  var path = location.pathname;
  var views = ['sentencias','directivas','medioambiente','opinion','otros','glosario','comunidad','about','debate-del-dia','pregunta'];
  var view = path.replace(/^\/|\/$/g,'');
  if(views.indexOf(view) !== -1){
    sessionStorage.setItem('__overton_view__', view === 'debate-del-dia' ? 'home' : view);
  }
  // Redirigir al index preservando query y hash
  var redirect = location.protocol + '//' + location.host + '/' +
    (location.search ? location.search + '&' : '?') + '_404=1' +
    (location.hash ? location.hash : '');
  location.replace(redirect);
})();
</script>
</head>
<body>
<p>Redirigiendo...</p>
</body>
</html>
